name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:      # 支持手动触发
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GitHub stats SVGs
        run: |
          mkdir -p assets
          curl -sL --max-time 30 \
            "https://github-readme-stats.vercel.app/api?username=JLChennn&show_icons=true&title_color=141413&text_color=141413&icon_color=d97757&bg_color=faf9f5&border_color=e8e6dc&border_radius=10&hide=issues&cache_seconds=86400" \
            -o assets/github-stats.svg
          curl -sL --max-time 30 \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=JLChennn&layout=compact&title_color=141413&text_color=141413&bg_color=faf9f5&border_color=e8e6dc&border_radius=10&langs_count=6&cache_seconds=86400" \
            -o assets/top-langs.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GitHub stats"
            git push
          fi
